<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" role="img" aria-label="Square and Compasses">
  <!-- Compass left leg -->
  <line x1="100" y1="32" x2="42" y2="168" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
  <!-- Compass right leg -->
  <line x1="100" y1="32" x2="158" y2="168" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
  <!-- Compass pivot -->
  <circle cx="100" cy="32" r="7" fill="currentColor"/>
  <!-- Compass points (sharp tips) -->
  <polygon points="42,162 38,174 46,174" fill="currentColor"/>
  <polygon points="158,162 154,174 162,174" fill="currentColor"/>
  <!-- Compass link bar (mid-leg spreader) -->
  <line x1="66" y1="106" x2="134" y2="106" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <circle cx="66" cy="106" r="4" fill="currentColor"/>
  <circle cx="134" cy="106" r="4" fill="currentColor"/>

  <!-- Square - long horizontal arm -->
  <line x1="52" y1="128" x2="148" y2="128" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
  <!-- Square - vertical arm going down from left -->
  <line x1="52" y1="128" x2="52" y2="182" stroke="currentColor" stroke-width="7" stroke-linecap="round"/>
  <!-- Square corner indicator -->
  <rect x="52" y="128" width="14" height="14" fill="none" stroke="currentColor" stroke-width="3"/>

  <!-- G in center -->
  <text x="100" y="120" text-anchor="middle" dominant-baseline="middle"
        font-family="Georgia, serif" font-size="38" font-weight="bold"
        fill="currentColor">G</text>
</svg>
